name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Expo SDK 55 / expo-modules-core uses isolated conformances (`@MainActor` on
    # protocol conformances) — a Swift 6.2 feature. Need Xcode 26+ which ships
    # on macOS 15 runner images. Older Xcode (16.4 on macos-latest=macos-14)
    # rejects the syntax as "unknown attribute 'MainActor'".
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i Xcode || true
          # Prefer Xcode 26 (Swift 6.2). Fallback to highest available if not present.
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]+' | sort -V | tail -n 1)
            echo "Xcode 26 not found, using $LATEST"
            sudo xcode-select -s "/Applications/$LATEST"
          fi
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch RCT-Folly podspec
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const podspecPath = path.join(process.cwd(), 'node_modules/react-native/third-party-podspecs/RCT-Folly.podspec');
            if (fs.existsSync(podspecPath)) {
              let content = fs.readFileSync(podspecPath, 'utf8');
              content = content.replace(/'folly\\/system\\/\\*\\.h',/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',\")
                               .replace(/'folly\\/system\\/\\*\\.h'/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'\");
              fs.writeFileSync(podspecPath, content);
              console.log('Patched RCT-Folly.podspec');
            } else {
              console.log('RCT-Folly.podspec not found, skipping patch.');
            }
          "

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Wrap Fabric C++ headers in __cplusplus guards
        working-directory: ios
        run: |
          set -x
          # Bulk-unlock Pods/ so the wrap script can rewrite read-only headers
          # (RCT-Folly, xcframework headers, etc.).
          chmod -R u+w Pods || true
          echo "PWD: $(pwd)"
          echo "Pods top: $(ls Pods 2>/dev/null | head -20)"
          echo "Pods/Headers exists: $([ -d Pods/Headers ] && echo yes || echo no)"
          echo "Pods/Headers/Public exists: $([ -d Pods/Headers/Public ] && echo yes || echo no)"
          ls -d Pods/Headers/Public/React-* Pods/Headers/Public/ReactCodegen 2>/dev/null | head -20 || true
          echo "BaseViewEventEmitter.h present?"
          find Pods -name BaseViewEventEmitter.h 2>/dev/null | head -5

          # Strategy: scan .h under Pods/Headers/Public (the active include path
          # for clang) that #include a C++ stdlib token. Wrap body in
          # `#if defined(__cplusplus)`. ObjC parse sees empty file, C++ parse
          # sees full content. RN 0.83 ships React as prebuilt xcframework -
          # public headers under Pods/Headers/Public are symlinks; resolve and
          # chmod writable before patching the real target.
          node -e "
            const fs = require('fs');
            const path = require('path');
            const CXX_TOKENS = new RegExp([
              '#include\\s+<(memory|vector|string|functional|optional|unordered_map|unordered_set|map|set|deque|list|array|tuple|chrono|atomic|mutex|thread|future|variant|type_traits|algorithm|iterator|stdexcept|utility|cstdint|cstddef|initializer_list|numeric|limits|cmath|cstdlib|cstdio|cassert|memory_resource|bit|concepts|coroutine|expected|ranges|span|string_view)>',
              '^\\s*namespace\\s+\\w+\\s*\\{',
              '^\\s*template\\s*<',
              '^\\s*using\\s+namespace\\s+\\w',
              '\\bstd::\\w+'
            ].join('|'), 'm');
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              const out = [];
              let ents;
              try { ents = fs.readdirSync(dir, { withFileTypes: true }); } catch (e) { return []; }
              for (const ent of ents) {
                const p = path.join(dir, ent.name);
                let st;
                try { st = fs.statSync(p); } catch (e) { continue; }
                if (st.isDirectory()) out.push(...walk(p));
                else if (st.isFile() && (p.endsWith('.h') || p.endsWith('.hpp'))) out.push(p);
              }
              return out;
            }
            const roots = ['Pods/Headers/Public', 'Pods/React-Core-prebuilt'];
            console.log('TAMTAM: scanning', roots.join(', '), '(cwd=' + process.cwd() + ')');
            const all = roots.flatMap(r => walk(r));
            console.log('TAMTAM: found', all.length, '.h/.hpp files');
            let patched = 0, skipped = 0, errs = 0, seen = new Set();
            for (const file of all) {
              let real;
              try { real = fs.realpathSync(file); } catch (e) { continue; }
              if (seen.has(real)) continue;
              seen.add(real);
              let s;
              try { s = fs.readFileSync(real, 'utf8'); } catch (e) { continue; }
              if (!CXX_TOKENS.test(s)) continue;
              if (s.includes('// TAMTAM_CXX_GUARD')) { skipped++; continue; }
              s = '// TAMTAM_CXX_GUARD\n#if defined(__cplusplus)\n' + s + '\n#endif // TAMTAM_CXX_GUARD\n';
              try { fs.chmodSync(real, 0o644); } catch (e) {}
              try { fs.writeFileSync(real, s); patched++; }
              catch (e) { errs++; console.log('  skip (write fail):', real, e.code); }
            }
            console.log('TAMTAM: wrapped', patched, 'C++ headers; skipped', skipped, '; errors', errs);
          "
          echo "---- post-wrap check of BaseViewEventEmitter.h ----"
          head -5 Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h 2>&1 || true
          echo "---- realpath of that file ----"
          ls -lL Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h 2>&1 || true
          readlink -f Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h 2>&1 || true

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee xcodebuild.log | (xcpretty || cat) || BUILD_FAILED=1
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "::group::Build errors (last 200 lines around 'error:')"
            grep -B 2 -A 8 "error:" xcodebuild.log | tail -n 200 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          if-no-files-found: ignore

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
