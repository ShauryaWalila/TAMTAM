name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Expo SDK 55 / expo-modules-core uses isolated conformances (`@MainActor` on
    # protocol conformances) — a Swift 6.2 feature. Need Xcode 26+ which ships
    # on macOS 15 runner images. Older Xcode (16.4 on macos-latest=macos-14)
    # rejects the syntax as "unknown attribute 'MainActor'".
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i Xcode || true
          # Prefer Xcode 26 (Swift 6.2). Fallback to highest available if not present.
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]+' | sort -V | tail -n 1)
            echo "Xcode 26 not found, using $LATEST"
            sudo xcode-select -s "/Applications/$LATEST"
          fi
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch RCT-Folly podspec
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const podspecPath = path.join(process.cwd(), 'node_modules/react-native/third-party-podspecs/RCT-Folly.podspec');
            if (fs.existsSync(podspecPath)) {
              let content = fs.readFileSync(podspecPath, 'utf8');
              content = content.replace(/'folly\\/system\\/\\*\\.h',/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',\")
                               .replace(/'folly\\/system\\/\\*\\.h'/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'\");
              fs.writeFileSync(podspecPath, content);
              console.log('Patched RCT-Folly.podspec');
            } else {
              console.log('RCT-Folly.podspec not found, skipping patch.');
            }
          "

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee xcodebuild.log | (xcpretty || cat) || BUILD_FAILED=1
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "::group::Build errors (last 200 lines around 'error:')"
            grep -B 2 -A 8 "error:" xcodebuild.log | tail -n 200 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          if-no-files-found: ignore

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
