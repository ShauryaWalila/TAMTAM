name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Dependencies for RN 0.81
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            function patchFile(relPath, patchFn) {
              const fullPath = path.join(process.cwd(), relPath);
              if (!fs.existsSync(fullPath)) {
                console.log('Skipping missing file:', relPath);
                return;
              }
              console.log('Patching:', relPath);
              let content = fs.readFileSync(fullPath, 'utf8');
              content = patchFn(content);
              fs.writeFileSync(fullPath, content);
            }

            // 1. Fix RCT-Folly podspec
            patchFile('node_modules/react-native/third-party-podspecs/RCT-Folly.podspec', c => {
              return c.replace(/'folly\/system\/\*\\.h',/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',\")
                      .replace(/'folly\/system\/\*\\.h'/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'\");
            });

            // 2. Fix ReanimatedMountHook (Type mismatch)
            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/Fabric/ReanimatedMountHook.h', c => 
              c.replace(/double mountTime\) noexcept override;/g, 'facebook::react::HighResTimeStamp mountTime) noexcept override;')
            );
            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/Fabric/ReanimatedMountHook.cpp', c => 
              c.replace(/double\) noexcept {/g, 'facebook::react::HighResTimeStamp) noexcept {')
            );

            // 3. Fix REAModule (Missing runtimeExecutor)
            const vCheck = '#if REACT_NATIVE_MINOR_VERSION >= 74 && REACT_NATIVE_MINOR_VERSION < 81';
            patchFile('node_modules/react-native-reanimated/apple/reanimated/apple/REAModule.h', c => 
              c.replace(/#if REACT_NATIVE_MINOR_VERSION >= 74/g, vCheck)
            );
            patchFile('node_modules/react-native-reanimated/apple/reanimated/apple/REAModule.mm', c => 
              c.replace(/#if REACT_NATIVE_MINOR_VERSION >= 74/g, vCheck)
            );

            // 4. Fix NativeReanimatedModule.cpp (CoreFeatures, shadowNodeFromValue, ShadowTree::commit, RawEvent)
            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/NativeModules/NativeReanimatedModule.cpp', c => {
              // Force version and add headers
              c = '#define REACT_NATIVE_MINOR_VERSION 81\n#include <react/renderer/bridging/bridging.h>\n' + c;
              // Fix CoreFeatures inclusion
              c = c.replace(/#if REACT_NATIVE_MINOR_VERSION >= 73/g, '#if REACT_NATIVE_MINOR_VERSION >= 73 && REACT_NATIVE_MINOR_VERSION < 81');
              // Inject shadowNodeFromValue helper
              c = c.replace('using namespace facebook;', 'using namespace facebook;\nnamespace reanimated { inline static std::shared_ptr<const facebook::react::ShadowNode> shadowNodeFromValue(facebook::jsi::Runtime &rt, const facebook::jsi::Value &v) { return facebook::react::Bridging<std::shared_ptr<const facebook::react::ShadowNode>>::fromJs(rt, v); } }');
              // Fix ShadowTree::commit options (remove .shouldYield)
              c = c.replace(/\{\/\* \.enableStateReconciliation = \*\/[\s\S]*?\.shouldYield = [\s\S]*?\}\s*\}\s*\);/g, '{/* .enableStateReconciliation = */ false, /* .mountSynchronously = */ true });');
              
              // Direct RawEvent patch to avoid version macro issues
              c = c.replace(/const auto &payloadFactory = rawEvent\.payloadFactory;/g, 'const auto &eventPayload = rawEvent.eventPayload;');
              c = c.replace(/jsi::Value payload = payloadFactory\(rt\);/g, 'jsi::Value payload = eventPayload->asJSIValue(rt);');
              
              return c;
            });

            // 5. Fix LayoutAnimations (ShadowViewMutation::parentShadowView removed in RN 0.81)
            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/LayoutAnimations/LayoutAnimationsUtils.cpp', c => 
              c.replace(/mutation\.parentShadowView\.tag/g, 'mutation.parentTag')
            );
            
            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/LayoutAnimations/LayoutAnimationsProxy.h', c => 
              c.replace(/std::shared_ptr<ShadowView> finalView, currentView, parentView;/g, 'std::shared_ptr<ShadowView> finalView, currentView; Tag parentTag;')
            );

            patchFile('node_modules/react-native-reanimated/Common/cpp/reanimated/LayoutAnimations/LayoutAnimationsProxy.cpp', c => {
              c = c.replace(/mutation\.parentShadowView\.tag/g, 'mutation.parentTag')
                   .replace(/auto parentView = std::make_shared<ShadowView>\(mutation\.parentShadowView\);/g, 'Tag parentTag = mutation.parentTag;')
                   .replace(/auto parent = std::make_shared<ShadowView>\(mutation\.parentShadowView\);/g, 'Tag parentTag = mutation.parentTag;')
                   .replace(/LayoutAnimation\{finalView, currentView, parentView, {}, count\}/g, 'LayoutAnimation{finalView, currentView, parentTag, {}, count}')
                   .replace(/LayoutAnimation\{finalView, current, parent, opacity\}/g, 'LayoutAnimation{finalView, current, parentTag, opacity}')
                   .replace(/\*layoutAnimation\.parentView/g, 'layoutAnimation.parentTag')
                   .replace(/\[finalView, current, parent, mutation,/g, '[finalView, current, parentTag, mutation,');
              
              // Handle remaining mutation.parentShadowView.layoutMetrics access (unlikely to work well but must compile)
              c = c.replace(/mutation\.parentShadowView/g, 'mutation.parentTag');
              
              // Special case for maybeUpdateWindowDimensions which uses layoutMetrics
              c = c.replace(/surfaceManager\.updateWindow\([\s\S]*?\);/g, '// Updated via surfaceId directly in 0.81');
              return c;
            });
          "


      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet || (echo "Build failed, showing last 100 lines of error log:" && xcodebuild build -workspace TAMTAM.xcworkspace -scheme TAMTAM -configuration Release -sdk iphoneos -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="" COMPILER_INDEX_STORE_ENABLE=NO | grep -A 5 "error:" | tail -n 100 && exit 1)

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
