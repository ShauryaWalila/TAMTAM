name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Expo Widgets Plugin (Fix Regex Bug)
        run: |
          node -e '
            const fs = require("fs");
            const file = "node_modules/@bittingz/expo-widgets/plugin/build/ios/withPodfile.js";
            if (fs.existsSync(file)) {
              console.log("Patching " + file);
              let content = fs.readFileSync(file, "utf8");
              // surgical fix: find the active mergeContents call and replace its anchor to prevent failure
              // The error is: Failed to match "/resource_bundle_target.build_configurations.each do |config|/"
              content = content.replace(
                /anchor:\s*\/resource_bundle_target\.build_configurations\.each do \|config\|/,
                "anchor: /post_install do \\|installer\\|/"
              );
              fs.writeFileSync(file, content);
              console.log("Successfully patched plugin logic.");
            } else {
              console.log("Plugin file not found, skipping patch.");
            }
          '

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build App Bundle (Unsigned)
        run: |
          xcodebuild build \
            -workspace ios/TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Find the .app file and move it to Payload
          find ./build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
