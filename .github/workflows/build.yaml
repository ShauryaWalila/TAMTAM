name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        working-directory: TAMTAM
        run: npm install --legacy-peer-deps

      - name: Patch Expo Widgets Plugin (Fix Regex Bug)
        working-directory: TAMTAM
        run: |
          node -e '
            const fs = require("fs");
            const file = "node_modules/@bittingz/expo-widgets/plugin/build/ios/withPodfile.js";
            if (fs.existsSync(file)) {
              console.log("Patching " + file);
              let content = fs.readFileSync(file, "utf8");
              // Use a more global regex to find and replace the problematic anchor
              // This handles cases where it might be slightly different or commented out
              const problematicRegex = /anchor:\s*\/resource_bundle_target\.build_configurations\.each do \|config\|/;
              if (problematicRegex.test(content)) {
                content = content.replace(problematicRegex, "anchor: /post_install do \\|installer\\|/");
                fs.writeFileSync(file, content);
                console.log("Successfully patched plugin logic.");
              } else {
                console.log("Regex not found in file content, checking for alternative patterns...");
                // Fallback: If the exact regex is not found, try to replace any mention of resource_bundle_target as anchor
                content = content.replace(/anchor:.*resource_bundle_target.*/g, "anchor: /post_install do \\|installer\\|/");
                fs.writeFileSync(file, content);
                console.log("Applied fallback patch.");
              }
            } else {
              console.log("Plugin file not found at: " + file);
              process.exit(1); // Fail the build if we cant find the file to patch
            }
          '

      - name: Expo Prebuild
        working-directory: TAMTAM
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        working-directory: TAMTAM/ios
        run: pod install

      - name: Build App Bundle (Unsigned)
        working-directory: TAMTAM/ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        working-directory: TAMTAM
        run: |
          mkdir -p Payload
          # Find the .app file and move it to Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM/TAMTAM.ipa
