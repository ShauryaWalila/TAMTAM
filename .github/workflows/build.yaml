name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Expo Widgets Plugin (Deep Fix)
        run: node scripts/fix-widgets-plugin.js

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile Sources
        working-directory: ios
        run: |
          # Prepend the git source to the Podfile to ensure RCT-Folly can be found
          # The CDN (default) often fails for New Arch dependencies on CI
          echo "source 'https://github.com/CocoaPods/Specs.git'" > Podfile.tmp
          cat Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          cat Podfile # Log it for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
