name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Expo SDK 55 / expo-modules-core uses isolated conformances (`@MainActor` on
    # protocol conformances) — a Swift 6.2 feature. Need Xcode 26+ which ships
    # on macOS 15 runner images. Older Xcode (16.4 on macos-latest=macos-14)
    # rejects the syntax as "unknown attribute 'MainActor'".
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i Xcode || true
          # Prefer Xcode 26 (Swift 6.2). Fallback to highest available if not present.
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]+' | sort -V | tail -n 1)
            echo "Xcode 26 not found, using $LATEST"
            sudo xcode-select -s "/Applications/$LATEST"
          fi
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Expo SDK 55 removed-API usage in Swift files
        run: node scripts/patch-expo-removed-apis.js

      - name: Strip RCT_NEW_ARCH_ENABLED from expo-modules-core podspec
        run: |
          # expo-modules-core's podspec hard-codes -DRCT_NEW_ARCH_ENABLED at
          # the pod-target xcconfig level. Project-level newArchEnabled=false
          # doesn't reach this. Sed it out before pod install.
          F=node_modules/expo-modules-core/ExpoModulesCore.podspec
          if [ -f "$F" ]; then
            sed -i.bak -E 's/-D *RCT_NEW_ARCH_ENABLED(=[0-9]+)?//g' "$F"
            echo "Stripped RCT_NEW_ARCH_ENABLED from $F"
            grep -n "RCT_NEW_ARCH_ENABLED\|new_arch_enabled\|newArchEnabled\|new arch" "$F" || true
          fi
          # Also strip any other expo-* podspecs that inject it
          for pf in node_modules/expo-*/Expo*.podspec; do
            if [ -f "$pf" ] && grep -q "RCT_NEW_ARCH_ENABLED" "$pf"; then
              sed -i.bak -E 's/-D *RCT_NEW_ARCH_ENABLED(=[0-9]+)?//g' "$pf"
              echo "Stripped from $pf"
            fi
          done

      - name: Diagnose + fix LazyObject in ExpoModulesHostObject.mm
        run: |
          set -x
          # Locate where LazyObject class is declared in expo-modules-core
          echo "--- Hunting for LazyObject declaration ---"
          grep -rEn "class\s+LazyObject\b|^class LazyObject" node_modules/expo-modules-core/ios node_modules/expo-modules-core/common 2>/dev/null | head -10 || true
          echo "--- Current imports in ExpoModulesHostObject.mm ---"
          F=node_modules/expo-modules-core/ios/JS/ExpoModulesHostObject.mm
          grep -n "^#" "$F" | head -25 || true

          # Most likely path: node_modules/expo-modules-core/common/cpp/LazyObject.h or
          # node_modules/expo-modules-core/ios/JS/LazyObject.h. Find it and add
          # an explicit #import line at the top of the .mm if missing.
          DECL=$(grep -rl "class LazyObject" node_modules/expo-modules-core 2>/dev/null | head -1)
          if [ -n "$DECL" ] && [ -f "$F" ]; then
            HDR_NAME=$(basename "$DECL")
            if ! grep -q "$HDR_NAME" "$F"; then
              echo "Adding #import \"$HDR_NAME\" to $F"
              sed -i.bak "1i\\
#import \"$HDR_NAME\"
" "$F"
              head -10 "$F"
            else
              echo "$HDR_NAME already referenced in $F"
            fi
          else
            echo "Could not locate LazyObject declaration"
          fi

      - name: Stub broken expo-modules-core SwiftUI Fabric file
        run: |
          # SwiftUIVirtualViewObjC.mm references undefined codegen types
          # (expo::ExpoViewComponentDescriptor, etc.) that don't exist in
          # this expo-modules-core 3.x build. With new arch disabled, the
          # file's behavior is irrelevant (no Expo SwiftUI views fire). Stub
          # it so compilation passes.
          F=node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIVirtualViewObjC.mm
          if [ -f "$F" ]; then
            cat > "$F" << 'EOF'
          // TAMTAM: stubbed - SwiftUI Fabric types missing in this build.
          // App does not use Expo SwiftUI views, so empty implementation is safe.
          #import <Foundation/Foundation.h>
          EOF
            echo "Stubbed: $F"
            head -5 "$F"
          else
            echo "$F not found"
          fi

      - name: Patch RCT-Folly podspec
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const podspecPath = path.join(process.cwd(), 'node_modules/react-native/third-party-podspecs/RCT-Folly.podspec');
            if (fs.existsSync(podspecPath)) {
              let content = fs.readFileSync(podspecPath, 'utf8');
              content = content.replace(/'folly\\/system\\/\\*\\.h',/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',\")
                               .replace(/'folly\\/system\\/\\*\\.h'/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'\");
              fs.writeFileSync(podspecPath, content);
              console.log('Patched RCT-Folly.podspec');
            } else {
              console.log('RCT-Folly.podspec not found, skipping patch.');
            }
          "

      - name: Expo Prebuild
        env:
          RCT_NEW_ARCH_ENABLED: '0'
          EX_DEV_LAUNCHER_NEW_ARCH_ENABLED: '0'
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Force-disable New Architecture in Podfile.properties.json
        run: |
          PROPS=ios/Podfile.properties.json
          if [ -f "$PROPS" ]; then
            node -e "
              const fs = require('fs');
              const p = '$PROPS';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j['newArchEnabled'] = 'false';
              j['expo.fabricEnabled'] = 'false';
              fs.writeFileSync(p, JSON.stringify(j, null, 2));
              console.log('TAMTAM: Podfile.properties.json after override:'); console.log(JSON.stringify(j, null, 2));
            "
          else
            echo "Podfile.properties.json not found"
          fi

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        env:
          RCT_NEW_ARCH_ENABLED: '0'
          EX_DEV_LAUNCHER_NEW_ARCH_ENABLED: '0'
        run: pod install

      - name: Wrap Fabric C++ headers in __cplusplus guards
        working-directory: ios
        run: |
          set -x
          exec > >(tee wrap.log) 2>&1
          # Bulk-unlock Pods/ AND node_modules/ so wrap can rewrite read-only
          # headers and headers reached via Pods symlinks into node_modules
          # (RN 0.83's React-Fabric pod sources from node_modules/react-native).
          chmod -R u+w Pods || true
          chmod -R u+w ../node_modules/react-native || true
          node ../scripts/wrap-cxx-headers.js
          echo "---- post-wrap check of BaseViewEventEmitter.h ----"
          head -5 Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h 2>&1 || true
          readlink -f Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h 2>&1 || true

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee xcodebuild.log | (xcpretty || cat) || BUILD_FAILED=1
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "::group::Wrap step log (wrap.log)"
            cat wrap.log 2>&1 || echo "wrap.log missing"
            echo "::endgroup::"
            echo "::group::Sample of patched-or-not BaseViewEventEmitter.h"
            for f in $(find Pods/React-Core-prebuilt -name BaseViewEventEmitter.h 2>/dev/null | head -5) \
                     Pods/Headers/Public/React-Fabric/react/renderer/components/view/BaseViewEventEmitter.h \
                     Pods/Headers/Public/React-Core-prebuilt/React_Fabric/BaseViewEventEmitter.h; do
              echo "--- $f"
              head -5 "$f" 2>&1 || true
            done
            echo "::endgroup::"
            echo "::group::Build errors (last 200 lines around 'error:')"
            grep -B 2 -A 8 "error:" xcodebuild.log | tail -n 200 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          if-no-files-found: ignore

      - name: Upload wrap step log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrap-log
          path: ios/wrap.log
          if-no-files-found: ignore

      - name: Upload post-codegen wrap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrap-codegen-log
          path: ios/wrap-codegen.log
          if-no-files-found: ignore

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
