name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Folly and Reanimated
        run: |
          # 1. Fix RCT-Folly podspec in RN 0.81.x (missing synchronization and coro headers)
          PODSPEC="node_modules/react-native/third-party-podspecs/RCT-Folly.podspec"
          if [ -f "$PODSPEC" ]; then
            echo "Patching RCT-Folly.podspec..."
            # Use a more robust sed approach to add headers to source_files and preserve_paths
            sed -i '' "s|'folly/system/\*\.h',|'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',|g" "$PODSPEC"
            sed -i '' "s|'folly/system/\*\.h'|'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'|g" "$PODSPEC"
          fi

          # 2. Fix RNReanimated ReanimatedMountHook (type mismatch in RN 0.81.x)
          # UIManagerMountHook::shadowTreeDidMount changed its second parameter from 'double' to 'HighResTimeStamp'
          REA_HOOK_H="node_modules/react-native-reanimated/Common/cpp/reanimated/Fabric/ReanimatedMountHook.h"
          REA_HOOK_CPP="node_modules/react-native-reanimated/Common/cpp/reanimated/Fabric/ReanimatedMountHook.cpp"

          if [ -f "$REA_HOOK_H" ]; then
            echo "Patching ReanimatedMountHook.h..."
            sed -i '' "s/double mountTime) noexcept override;/facebook::react::HighResTimeStamp mountTime) noexcept override;/g" "$REA_HOOK_H"
          fi

          if [ -f "$REA_HOOK_CPP" ]; then
            echo "Patching ReanimatedMountHook.cpp..."
            sed -i '' "s/double) noexcept {/facebook::react::HighResTimeStamp) noexcept {/g" "$REA_HOOK_CPP"
          fi

          # 3. Fix REAModule.h & REAModule.mm (RCTRuntimeExecutorModule removed in RN 0.81.x)
          REA_MODULE_H="node_modules/react-native-reanimated/apple/reanimated/apple/REAModule.h"
          REA_MODULE_MM="node_modules/react-native-reanimated/apple/reanimated/apple/REAModule.mm"
          if [ -f "$REA_MODULE_H" ]; then
            echo "Patching REAModule.h..."
            # Wrap RCTRuntimeExecutorModule usage with version check < 81
            sed -i '' "s/#if REACT_NATIVE_MINOR_VERSION >= 74/#if REACT_NATIVE_MINOR_VERSION >= 74 \&\& REACT_NATIVE_MINOR_VERSION < 81/g" "$REA_MODULE_H"
          fi
          if [ -f "$REA_MODULE_MM" ]; then
            echo "Patching REAModule.mm..."
            # Apply same version check to implementation
            sed -i '' "s/#if REACT_NATIVE_MINOR_VERSION >= 74/#if REACT_NATIVE_MINOR_VERSION >= 74 \&\& REACT_NATIVE_MINOR_VERSION < 81/g" "$REA_MODULE_MM"
          fi


      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet || (echo "Build failed, showing last 100 lines of error log:" && xcodebuild build -workspace TAMTAM.xcworkspace -scheme TAMTAM -configuration Release -sdk iphoneos -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="" COMPILER_INDEX_STORE_ENABLE=NO | grep -A 5 "error:" | tail -n 100 && exit 1)

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
