name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Expo Widgets Plugin (Deep Fix)
        run: node scripts/fix-widgets-plugin.js

      - name: Fix Folly Podspec
        run: |
          # The default RCT-Folly podspec in RN 0.81.x is missing synchronization headers in source_files
          PODSPEC="node_modules/react-native/third-party-podspecs/RCT-Folly.podspec"
          if [ -f "$PODSPEC" ]; then
            # Insert the missing header path right after 'folly/*.h'
            sed -i '' "s|'folly\/\*\.h',|'folly\/\*\.h',\n                      'folly\/synchronization\/\*\.h',|g" "$PODSPEC"
            echo "Successfully patched RCT-Folly.podspec"
          else
            echo "Warning: RCT-Folly.podspec not found"
          fi

      - name: Patch React Native Maps for App Extension
        run: |
          # React Native Maps uses UIApplication.sharedApplication which is banned in widgets.
          # We wrap it in a compiler check to ignore it when building for extensions.
          MAP_MARKER="node_modules/react-native-maps/ios/AirMaps/AIRMapMarker.m"
          if [ -f "$MAP_MARKER" ]; then
            sed -i '' 's/UIWindow\* win = \[\[\[UIApplication sharedApplication\] windows\] firstObject\];/#if !TARGET_OS_APP_EXTENSION\n            UIWindow* win = [[[UIApplication sharedApplication] windows] firstObject];\n#else\n            UIWindow* win = nil;\n#endif/g' "$MAP_MARKER"
            echo "Successfully patched react-native-maps AIRMapMarker.m"
          fi

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet || (echo "Build failed, showing last 100 lines of error log:" && xcodebuild build -workspace TAMTAM.xcworkspace -scheme TAMTAM -configuration Release -sdk iphoneos -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="" COMPILER_INDEX_STORE_ENABLE=NO | grep -A 5 "error:" | tail -n 100 && exit 1)

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
