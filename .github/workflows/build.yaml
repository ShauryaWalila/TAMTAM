name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch Expo Widgets Plugin (Deep Fix)
        run: node scripts/fix-widgets-plugin.js

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        working-directory: ios
        run: |
          # 1. Force the CocoaPods Git repo as fallback
          echo "source 'https://github.com/CocoaPods/Specs.git'" > Podfile.tmp
          echo "source 'https://cdn.cocoapods.org/'" >> Podfile.tmp
          cat Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          
          # 2. Inject local paths for ALL critical third-party dependencies into EVERY target block
          # This is the most bulletproof way to ensure the resolver finds them locally.
          awk "/target '/ { 
            print; 
            print \"  pod 'boost', :podspec => '../node_modules/react-native/third-party-podspecs/boost.podspec'\";
            print \"  pod 'DoubleConversion', :podspec => '../node_modules/react-native/third-party-podspecs/DoubleConversion.podspec'\";
            print \"  pod 'fast_float', :podspec => '../node_modules/react-native/third-party-podspecs/fast_float.podspec'\";
            print \"  pod 'fmt', :podspec => '../node_modules/react-native/third-party-podspecs/fmt.podspec'\";
            print \"  pod 'glog', :podspec => '../node_modules/react-native/third-party-podspecs/glog.podspec'\";
            print \"  pod 'RCT-Folly', :podspec => '../node_modules/react-native/third-party-podspecs/RCT-Folly.podspec'\";
            next 
          }1\" Podfile > Podfile.tmp && mv Podfile.tmp Podfile
          
          cat Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
