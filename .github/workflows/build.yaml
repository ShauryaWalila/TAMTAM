name: Build TamTam IPA (Sideload Ready)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Expo SDK 55 / expo-modules-core uses isolated conformances (`@MainActor` on
    # protocol conformances) — a Swift 6.2 feature. Need Xcode 26+ which ships
    # on macOS 15 runner images. Older Xcode (16.4 on macos-latest=macos-14)
    # rejects the syntax as "unknown attribute 'MainActor'".
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i Xcode || true
          # Prefer Xcode 26 (Swift 6.2). Fallback to highest available if not present.
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]+' | sort -V | tail -n 1)
            echo "Xcode 26 not found, using $LATEST"
            sudo xcode-select -s "/Applications/$LATEST"
          fi
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Patch RCT-Folly podspec
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const podspecPath = path.join(process.cwd(), 'node_modules/react-native/third-party-podspecs/RCT-Folly.podspec');
            if (fs.existsSync(podspecPath)) {
              let content = fs.readFileSync(podspecPath, 'utf8');
              content = content.replace(/'folly\\/system\\/\\*\\.h',/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h',\")
                               .replace(/'folly\\/system\\/\\*\\.h'/g, \"'folly/system/*.h', 'folly/synchronization/*.h', 'folly/synchronization/detail/*.h', 'folly/futures/*.h', 'folly/futures/detail/*.h', 'folly/coro/*.h', 'folly/coro/detail/*.h', 'folly/executor/*.h', 'folly/executor/detail/*.h', 'folly/io/*.h', 'folly/io/async/*.h'\");
              fs.writeFileSync(podspecPath, content);
              console.log('Patched RCT-Folly.podspec');
            } else {
              console.log('RCT-Folly.podspec not found, skipping patch.');
            }
          "

      - name: Expo Prebuild
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --no-install --clean

      - name: Fix Podfile and Dependencies
        run: |
          node scripts/fix-podfile.js
          cat ios/Podfile # Log for debugging

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Wrap Fabric C++ headers in __cplusplus guards
        working-directory: ios
        run: |
          # Xcode 26 strict: when clang parses RNScreens/ExpoRouter umbrella
          # headers in ObjC mode, it chokes on #include <memory> in the chained
          # Fabric C++ headers. Marking modulemaps `requires cplusplus` cascades
          # to consumers. Cleanest fix: wrap each Fabric public header's body
          # in `#if defined(__cplusplus)` so ObjC parse sees empty, C++ sees
          # full content. ObjC code never uses these types anyway.
          node -e "
            const fs = require('fs');
            const path = require('path');
            const roots = [
              'Pods/Headers/Public/React-Fabric',
              'Pods/Headers/Public/React-FabricComponents',
              'Pods/Headers/Public/React-FabricImage',
              'Pods/Headers/Public/React-graphics',
              'Pods/Headers/Public/React-RCTFabric',
              'Pods/Headers/Public/React-ImageManager',
              'Pods/Headers/Public/ReactCodegen'
            ];
            const CXX_TOKENS = /#include\s+<(memory|vector|string|functional|optional|unordered_map|unordered_set|map|set|deque|list|array|tuple|chrono|atomic|mutex|thread|future|variant|type_traits|algorithm|iterator|stdexcept|utility|cstdint|cstddef|initializer_list|numeric|limits|cmath|cstdlib|cstdio|cassert|memory_resource|bit|concepts|coroutine|expected|ranges|span|string_view)>/;
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              const out = [];
              for (const ent of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, ent.name);
                if (ent.isDirectory()) out.push(...walk(p));
                else if (ent.isFile() && (ent.name.endsWith('.h') || ent.name.endsWith('.hpp'))) out.push(p);
              }
              return out;
            }
            let patched = 0, skipped = 0;
            for (const root of roots) {
              for (const file of walk(root)) {
                let s = fs.readFileSync(file, 'utf8');
                if (!CXX_TOKENS.test(s)) continue;
                if (s.includes('// TAMTAM_CXX_GUARD')) { skipped++; continue; }
                s = '// TAMTAM_CXX_GUARD\n#if defined(__cplusplus)\n' + s + '\n#endif // TAMTAM_CXX_GUARD\n';
                fs.writeFileSync(file, s);
                patched++;
              }
            }
            console.log('TAMTAM: wrapped', patched, 'Fabric C++ headers; skipped', skipped, 'already wrapped');
          "

      - name: Build App Bundle (Unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace TAMTAM.xcworkspace \
            -scheme TAMTAM \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee xcodebuild.log | (xcpretty || cat) || BUILD_FAILED=1
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "::group::Build errors (last 200 lines around 'error:')"
            grep -B 2 -A 8 "error:" xcodebuild.log | tail -n 200 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          if-no-files-found: ignore

      - name: Package IPA
        run: |
          mkdir -p Payload
          find ./ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} ./Payload/ \;
          zip -r TAMTAM.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAMTAM-Sideload-IPA
          path: TAMTAM.ipa
